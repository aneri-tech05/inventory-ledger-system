<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management</title>
    <link rel="stylesheet" href="warehouse.css">
</head>

<body>

    <div class="page-container">

        <header>
            <h1>Warehouse Management</h1>
            <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
        </header>

        <div class="form-card">

            <h2>Create Warehouse</h2>

            <form>

                <div class="input-group">
                    <label>Warehouse Name</label>
                    <input type="text" placeholder="Enter warehouse name">
                </div>

                <div class="input-group">
                    <label>Warehouse Code</label>
                    <input type="text" placeholder="WH-01">
                </div>

                <div class="input-group">
                    <label>Address</label>
                    <textarea placeholder="Warehouse Address"></textarea>
                </div>

                <button type="submit">Save Warehouse</button>

            </form>

        </div>

    </div>

</body>

</html>
